name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1: Run tests against a real Postgres instance
  # ──────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: recruitment_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run DB migrations
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/recruitment_test
        run: npx tsx scripts/migrate.ts

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/recruitment_test
          SESSION_SECRET: test-session-secret-32-chars-longxx
          HMAC_SECRET: test-hmac-secret-32-chars-long-xxxx
          APP_URL: http://localhost:3000
        run: npm test

  # ──────────────────────────────────────────────────────────
  # Job 2: Build Docker image and push to ghcr.io (master only)
  # ──────────────────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.short_sha.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA and lowercase image name
        id: short_sha
        run: |
          echo "tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.short_sha.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────
  # Job 3: Deploy to cloud VM via SSH (master only)
  # ──────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          APP_URL: ${{ secrets.APP_URL }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          DB_DATA_PATH: ${{ secrets.DB_DATA_PATH }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DB_PASSWORD,DB_DATA_PATH,SESSION_SECRET,HMAC_SECRET,RESEND_API_KEY,EMAIL_FROM,APP_URL,IMAGE_TAG,GH_TOKEN,GH_ACTOR
          script: |
            set -e
            mkdir -p /opt/uni-recruitment-app
            cd /opt/uni-recruitment-app

            # Write docker-compose.prod.yml (no secrets — safe to write inline)
            cat > docker-compose.prod.yml << 'COMPOSE'
            services:
              app:
                image: ghcr.io/piotrmarzec/uni-recruitment-app:${IMAGE_TAG:-latest}
                container_name: regie
                environment:
                  - DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@db:5432/recruitment
                  - SESSION_SECRET=${SESSION_SECRET}
                  - HMAC_SECRET=${HMAC_SECRET}
                  - RESEND_API_KEY=${RESEND_API_KEY}
                  - EMAIL_FROM=${EMAIL_FROM}
                  - APP_URL=${APP_URL}
                  - NODE_ENV=production
                depends_on:
                  db:
                    condition: service_healthy
                restart: unless-stopped
                networks:
                  - proxy
                  - internal

              db:
                image: postgres:16-alpine
                environment:
                  POSTGRES_DB: recruitment
                  POSTGRES_USER: postgres
                  POSTGRES_PASSWORD: ${DB_PASSWORD}
                volumes:
                  - ${DB_DATA_PATH}:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U postgres"]
                  interval: 5s
                  timeout: 5s
                  retries: 5
                restart: unless-stopped
                networks:
                  - internal

            networks:
              proxy:
                external: true
                name: proxy
              internal:
                internal: true
            COMPOSE

            # Write .env from GitHub secrets (values are masked in logs)
            printf 'DB_PASSWORD=%s\n'    "$DB_PASSWORD"    >  .env
            printf 'DB_DATA_PATH=%s\n'   "$DB_DATA_PATH"   >> .env
            printf 'SESSION_SECRET=%s\n' "$SESSION_SECRET"  >> .env
            printf 'HMAC_SECRET=%s\n'    "$HMAC_SECRET"     >> .env
            printf 'RESEND_API_KEY=%s\n' "$RESEND_API_KEY"  >> .env
            printf 'EMAIL_FROM=%s\n'     "$EMAIL_FROM"      >> .env
            printf 'APP_URL=%s\n'        "$APP_URL"         >> .env
            printf 'IMAGE_TAG=%s\n'      "$IMAGE_TAG"       >> .env
            chmod 600 .env

            # Authenticate with ghcr.io
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            # Pull the new image and restart
            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d

            # Run DB migrations
            docker compose -f docker-compose.prod.yml exec app npx tsx scripts/migrate.ts

            # Remove dangling images to free disk space
            docker image prune -f
