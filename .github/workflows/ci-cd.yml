name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1: Run tests against a real Postgres instance
  # ──────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: recruitment_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run DB migrations
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/recruitment_test
        run: npx tsx scripts/migrate.ts

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/recruitment_test
          SESSION_SECRET: test-session-secret-32-chars-longxx
          HMAC_SECRET: test-hmac-secret-32-chars-long-xxxx
          APP_URL: http://localhost:3000
        run: npm test

  # ──────────────────────────────────────────────────────────
  # Job 2: Build Docker image and push to ghcr.io (master only)
  # ──────────────────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.short_sha.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: short_sha
        run: echo "tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.short_sha.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────
  # Job 3: Deploy to cloud VM via SSH (master only)
  # ──────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.prod.yml
          target: /opt/uni-recruitment-app/
          mkdir: true

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          APP_URL: ${{ secrets.APP_URL }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          DB_DATA_PATH: ${{ secrets.DB_DATA_PATH }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DB_PASSWORD,DB_DATA_PATH,SESSION_SECRET,HMAC_SECRET,RESEND_API_KEY,EMAIL_FROM,APP_URL,IMAGE_TAG,GH_TOKEN,GH_ACTOR
          script: |
            set -e
            cd /opt/uni-recruitment-app

            # Write .env from GitHub secrets (values are masked in logs)
            printf 'DB_PASSWORD=%s\n'    "$DB_PASSWORD"    >  .env
            printf 'DB_DATA_PATH=%s\n'   "$DB_DATA_PATH"   >> .env
            printf 'SESSION_SECRET=%s\n' "$SESSION_SECRET"  >> .env
            printf 'HMAC_SECRET=%s\n'    "$HMAC_SECRET"     >> .env
            printf 'RESEND_API_KEY=%s\n' "$RESEND_API_KEY"  >> .env
            printf 'EMAIL_FROM=%s\n'     "$EMAIL_FROM"      >> .env
            printf 'APP_URL=%s\n'        "$APP_URL"         >> .env
            printf 'IMAGE_TAG=%s\n'      "$IMAGE_TAG"       >> .env
            chmod 600 .env

            # Authenticate with ghcr.io
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            # Pull the new image and (re)start only the app container
            # The DB container is left running to avoid data disruption
            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d

            # Remove dangling images to free disk space
            docker image prune -f
